name: 🚀 Build y Publicar Release

on:
  push:
    tags:
      - 'v*.*.*'   # Se dispara al crear un tag como v1.0.0, v1.2.3, etc.

jobs:
  build-and-release:
    name: Build APK y Publicar GitHub Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Configurar JDK 17
      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Dar permisos al gradlew
      - name: 🔑 Permisos a Gradlew
        run: chmod +x gradlew

      # 4. Decodificar el Keystore desde el Secret de GitHub
      - name: 🔐 Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/keystore.jks

      # 5. Compilar el APK de Release y firmarlo
      - name: 🔨 Compilar APK Release
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # 6. Renombrar el APK con la versión del tag
      - name: 📦 Renombrar APK
        run: |
          VERSION="${{ github.ref_name }}"
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_DEST="app/build/outputs/apk/release/MisViejos-${VERSION}.apk"
          mv "$APK_SRC" "$APK_DEST"
          echo "APK_PATH=$APK_DEST" >> $GITHUB_ENV
          echo "APK_NAME=MisViejos-${VERSION}.apk" >> $GITHUB_ENV

      # 7. Crear el GitHub Release y subir el APK
      - name: 🎉 Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Nuestros Viejos ${{ github.ref_name }}"
          body: |
            ## 📱 Nuestros Viejos ${{ github.ref_name }}

            Nueva versión de la aplicación disponible para descargar.

            ### Instalación
            1. Descarga el archivo `MisViejos-${{ github.ref_name }}.apk`
            2. En tu Android, habilita **Instalar apps desconocidas** si es necesario
            3. Abre el archivo y sigue los pasos de instalación
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
